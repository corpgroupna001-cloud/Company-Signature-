<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signature</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      :root {
        --bg-1: #dbeafe;
        --bg-2: #f5d0fe;
        --bg-3: #fecdd3;
        --glass: rgba(255, 255, 255, 0.5);
        --glass-strong: rgba(255, 255, 255, 0.72);
        --line: rgba(255, 255, 255, 0.55);
        --shadow: 0 18px 60px rgba(15, 23, 42, 0.18);
        --text: #0f172a;
        --muted: #64748b;
        --accent: #ef4444;
      }

      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 15% 20%, rgba(255,255,255,0.9), transparent 18%),
          radial-gradient(circle at 85% 18%, rgba(191,219,254,0.95), transparent 20%),
          radial-gradient(circle at 80% 82%, rgba(244,114,182,0.30), transparent 18%),
          radial-gradient(circle at 10% 90%, rgba(254,205,211,0.8), transparent 18%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
        background-attachment: fixed;
        overflow: hidden;
      }

      .glass {
        background: linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.36));
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255,255,255,0.55);
        box-shadow: var(--shadow);
      }

      .glass-soft {
        background: linear-gradient(180deg, rgba(255,255,255,0.66), rgba(255,255,255,0.48));
        backdrop-filter: blur(16px) saturate(170%);
        -webkit-backdrop-filter: blur(16px) saturate(170%);
        border: 1px solid rgba(255,255,255,0.6);
      }

      .glass-chip {
        background: rgba(255,255,255,0.42);
        backdrop-filter: blur(14px) saturate(180%);
        -webkit-backdrop-filter: blur(14px) saturate(180%);
        border: 1px solid rgba(255,255,255,0.45);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
      }

      .floating-orb {
        position: fixed;
        border-radius: 999px;
        filter: blur(10px);
        opacity: 0.7;
        pointer-events: none;
      }

      .orb-a {
        width: 260px; height: 260px;
        top: 4%; left: 5%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(59,130,246,0.28));
        animation: floatA 11s ease-in-out infinite;
      }
      .orb-b {
        width: 320px; height: 320px;
        bottom: -4%; right: 2%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.92), rgba(236,72,153,0.26));
        animation: floatB 13s ease-in-out infinite;
      }
      .orb-c {
        width: 180px; height: 180px;
        top: 38%; right: 18%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.88), rgba(251,113,133,0.20));
        animation: floatC 9s ease-in-out infinite;
      }

      @keyframes floatA {
        0%, 100% { transform: translate3d(0,0,0); }
        50% { transform: translate3d(24px, 18px, 0); }
      }
      @keyframes floatB {
        0%, 100% { transform: translate3d(0,0,0); }
        50% { transform: translate3d(-22px, -14px, 0); }
      }
      @keyframes floatC {
        0%, 100% { transform: translate3d(0,0,0); }
        50% { transform: translate3d(-16px, 14px, 0); }
      }

      .app-shell {
        height: 100%;
        padding: 20px;
      }

      .sidebar-scroll, .content-scroll {
        scrollbar-width: none;
      }
      .sidebar-scroll::-webkit-scrollbar,
      .content-scroll::-webkit-scrollbar {
        display: none;
      }

      .field {
        width: 100%;
        border-radius: 18px;
        border: 1px solid rgba(255,255,255,0.55);
        background: rgba(255,255,255,0.52);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.52);
        padding: 12px 14px;
        font-size: 14px;
        color: #0f172a;
        outline: none;
        transition: 180ms ease;
      }
      .field:focus {
        background: rgba(255,255,255,0.72);
        border-color: rgba(239,68,68,0.4);
        box-shadow: 0 0 0 4px rgba(239,68,68,0.10), inset 0 1px 0 rgba(255,255,255,0.72);
      }
      .field::placeholder { color: #94a3b8; }

      .segmented {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 6px;
        border-radius: 20px;
      }

      .segmented button {
        border: 0;
        background: transparent;
        border-radius: 16px;
        padding: 10px 12px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #64748b;
        cursor: pointer;
        transition: 180ms ease;
      }

      .segmented button.active {
        background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.65));
        color: #0f172a;
        box-shadow: 0 8px 18px rgba(148, 163, 184, 0.25);
      }

      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 6px;
        background: rgba(255,255,255,0.55);
        border-radius: 999px;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffffff, #fee2e2);
        border: 1px solid rgba(239,68,68,0.30);
        box-shadow: 0 6px 14px rgba(239,68,68,0.25);
        cursor: pointer;
      }
      input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffffff, #fee2e2);
        border: 1px solid rgba(239,68,68,0.30);
        box-shadow: 0 6px 14px rgba(239,68,68,0.25);
        cursor: pointer;
      }

      .signature-stage {
        position: relative;
        overflow: hidden;
        min-height: 420px;
        border-radius: 32px;
      }

      .signature-stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(255,255,255,0.42), transparent 40%),
          radial-gradient(circle at top right, rgba(255,255,255,0.5), transparent 30%);
        pointer-events: none;
      }

      .copy-btn {
        border: 0;
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 180ms ease, background 180ms ease;
      }
      .copy-btn:active { transform: scale(0.98); }

      .signature-card {
        position: relative;
        padding: 24px;
        border-radius: 26px;
        background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.86));
        box-shadow: 0 30px 70px rgba(148,163,184,0.20);
        border: 1px solid rgba(255,255,255,0.7);
      }

      .signature-card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      }

      .tiny-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-weight: 800;
        color: #94a3b8;
      }

      @media (max-width: 1024px) {
        body { overflow: auto; }
        .app-shell { height: auto; min-height: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="floating-orb orb-a"></div>
    <div class="floating-orb orb-b"></div>
    <div class="floating-orb orb-c"></div>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useRef } = React;
      const DEFAULT_ICONS = {
        linkedin: "https://cdn-icons-png.flaticon.com/64/145/145807.png",
        facebook: "https://cdn-icons-png.flaticon.com/64/145/145802.png",
        instagram: "https://cdn-icons-png.flaticon.com/64/174/174855.png",
        youtube: "https://cdn-icons-png.flaticon.com/64/174/174883.png"
      };

      const ICON_PATHS = {
        copy: "M16 1H4a2 2 0 0 0-2 2v12h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z",
        check: "M20 6L9 17l-5-5 1.4-1.4L9 14.2 18.6 4.6 20 6z",
        user: "M12 12c2.76 0 5-2.69 5-6s-2.24-6-5-6-5 2.69-5 6 2.24 6 5 6zm0 2c-4.42 0-8 2.69-8 6v2h16v-2c0-3.31-3.58-6-8-6z",
        share: "M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7a2.48 2.48 0 0 0 0-1.39l7-4.11A2.99 2.99 0 1 0 15 5a3 3 0 0 0 .04.49l-7 4.12a3 3 0 1 0 0 4.78l7.05 4.14c-.03.15-.05.31-.05.47a3 3 0 1 0 3-2.92z",
        upload: "M5 17v2h14v-2H5zM12 3l-5.5 5.5 1.42 1.42L11 6.83V16h2V6.83l3.08 3.09 1.42-1.42L12 3z",
        x: "M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.41 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.29-6.3z",
        layout: "M3 5h18v2H3V5zm0 6h8v8H3v-8zm10 0h8v8h-8v-8z",
        globe: "M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm6.93 9h-3.06a15.65 15.65 0 0 0-1.38-5.01A8.03 8.03 0 0 1 18.93 11zM12 4c1.24 1.67 2.13 4.12 2.45 7H9.55C9.87 8.12 10.76 5.67 12 4zM4.07 13h3.06c.22 1.81.7 3.53 1.38 5.01A8.03 8.03 0 0 1 4.07 13zm3.06-2H4.07a8.03 8.03 0 0 1 4.44-5.01A15.65 15.65 0 0 0 7.13 11zM12 20c-1.24-1.67-2.13-4.12-2.45-7h4.9c-.32 2.88-1.21 5.33-2.45 7zm2.49-1.99A15.65 15.65 0 0 0 15.87 13h3.06a8.03 8.03 0 0 1-4.44 5.01z",
        monitor: "M4 3h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-6v2h3v2H7v-2h3v-2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm0 12h16V5H4v10z",
        pointer: "M4 3l7 16 2.2-6.8L20 10 4 3z",
        refresh: "M17.65 6.35A7.95 7.95 0 0 0 12 4V1L7 6l5 5V7a5 5 0 1 1-4.9 6h-2.02A7 7 0 1 0 17.65 6.35z",
        chevronDown: "M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6z",
        sparkles: "M12 2l1.76 4.24L18 8l-4.24 1.76L12 14l-1.76-4.24L6 8l4.24-1.76L12 2zm6 10l.94 2.06L21 15l-2.06.94L18 18l-.94-2.06L15 15l2.06-.94L18 12zM6 14l1.17 2.83L10 18l-2.83 1.17L6 22l-1.17-2.83L2 18l2.83-1.17L6 14z",
        badgeCheck: "M12 2l2.39 2.42 3.36-.48.48 3.36L20.65 10 18.23 12.4l.48 3.36-3.36.48L12 18.65l-2.42-2.41-3.36.48-.48-3.36L3.35 10l2.41-2.42-.48-3.36 3.36-.48L12 2zm-1 11 5-5-1.41-1.41L11 10.17 9.41 8.59 8 10l3 3z",
        wand: "M3 21l3-3 2 2-3 3H3v-2zM14.71 4.29l5 5-1.42 1.42-5-5 1.42-1.42zM12.59 6.41 4 15l5 5 8.59-8.59-5-5z"
      };

      const Icon = ({ name, size = 16, className = "" }) => (
        <svg viewBox="0 0 24 24" width={size} height={size} className={className} fill="currentColor" aria-hidden="true">
          <path d={ICON_PATHS[name] || ICON_PATHS.sparkles}></path>
        </svg>
      );

      const GlassSection = ({ icon, title, children, subtitle }) => (
        <section className="glass-soft rounded-[28px] p-5 md:p-6">
          <div className="flex items-start justify-between gap-4 mb-5">
            <div>
              <div className="flex items-center gap-2 mb-1">
                <div className="w-8 h-8 rounded-2xl glass-chip flex items-center justify-center text-slate-700">
                  <Icon name={icon} size={14} />
                </div>
                <h2 className="tiny-label">{title}</h2>
              </div>
              {subtitle ? <p className="text-xs text-slate-500 ml-10">{subtitle}</p> : null}
            </div>
          </div>
          {children}
        </section>
      );

      const SocialRow = ({ data, style }) => (
        <table cellPadding="0" cellSpacing="0" border="0" align="center" style={{ borderCollapse: 'collapse', ...style }}>
          <tbody>
            <tr>
              <td style={{ padding: '0 4px' }}><a href={data.linkedin || '#'} target="_blank" rel="noreferrer"><img src={DEFAULT_ICONS.linkedin} width="20" height="20" border="0" alt="LI" /></a></td>
              <td style={{ padding: '0 4px' }}><a href={data.facebook || '#'} target="_blank" rel="noreferrer"><img src={DEFAULT_ICONS.facebook} width="20" height="20" border="0" alt="FB" /></a></td>
              <td style={{ padding: '0 4px' }}><a href={data.instagram || '#'} target="_blank" rel="noreferrer"><img src={DEFAULT_ICONS.instagram} width="20" height="20" border="0" alt="IG" /></a></td>
              <td style={{ padding: '0 4px' }}><a href={data.youtube || '#'} target="_blank" rel="noreferrer"><img src={DEFAULT_ICONS.youtube} width="20" height="20" border="0" alt="YT" /></a></td>
            </tr>
          </tbody>
        </table>
      );

      const DetailsBlock = ({ data }) => (
        <div style={{ textAlign: 'left' }}>
          <div style={{ fontSize: '18px', fontWeight: 'bold', color: '#020617', marginBottom: '2px', lineHeight: '1.2' }}>{data.name || 'Full Name'}</div>
          <div style={{ fontSize: '13px', color: '#64748b', marginBottom: '4px' }}>{data.title || 'Job Title'}</div>
          <div style={{ fontSize: '15px', fontWeight: 'bold', color: '#dc2626', marginBottom: '10px' }}>{data.company}</div>
          <table cellPadding="0" cellSpacing="0" border="0" style={{ fontSize: '12px', color: '#334155', lineHeight: '1.5' }}>
            <tbody>
              <tr><td style={{ paddingBottom: '2px' }}><span style={{ fontWeight: 'bold', color: '#020617' }}>Mobile:</span> {data.mobile || '+00 00000 00000'}</td></tr>
              <tr><td style={{ paddingBottom: '2px' }}><span style={{ fontWeight: 'bold', color: '#020617' }}>Email:</span> {data.email || 'name@company.com'}</td></tr>
              <tr><td style={{ paddingTop: '6px', maxWidth: '300px', fontSize: '11px', color: '#64748b' }}><span style={{ fontWeight: 'bold', color: '#334155' }}>Address:</span> {data.address}</td></tr>
            </tbody>
          </table>
        </div>
      );

      const SignaturePreview = React.forwardRef(({ data, imageError, setImageError }, ref) => {
        const logoContent = data.logoUrl && !imageError ? (
          <img
            src={data.logoUrl}
            alt="Logo"
            width={data.logoWidth}
            border="0"
            style={{ display: 'block', border: '0', margin: '0 auto', width: `${data.logoWidth}px` }}
            onError={() => setImageError(true)}
          />
        ) : (
          <div style={{
            width: `${data.logoWidth}px`,
            height: '80px',
            background: 'linear-gradient(180deg, rgba(248,250,252,0.95), rgba(241,245,249,0.95))',
            border: '1px dashed #cbd5e1',
            borderRadius: '16px',
            display: 'table-cell',
            verticalAlign: 'middle',
            textAlign: 'center',
            color: '#94a3b8',
            fontSize: '10px'
          }}>
            Logo
          </div>
        );

        return (
          <div ref={ref} style={{ background: '#ffffff', display: 'inline-block' }}>
            <table cellPadding="0" cellSpacing="0" border="0" style={{ background: '#ffffff', minWidth: data.layout === 'top' ? '300px' : '400px', fontFamily: 'Arial, Helvetica, sans-serif', borderCollapse: 'collapse' }}>
              <tbody>
                {data.layout === 'top' ? (
                  <>
                    <tr>
                      <td align="center" style={{ paddingBottom: '15px', paddingTop: `${data.nudgeVertical}px` }}>
                        {data.websiteUrl ? <a href={data.websiteUrl} target="_blank" rel="noreferrer">{logoContent}</a> : logoContent}
                        <SocialRow data={data} style={{ marginTop: '12px' }} />
                      </td>
                    </tr>
                    <tr><td height="1" style={{ backgroundColor: '#e2e8f0', fontSize: '1px', lineHeight: '1px' }}>&nbsp;</td></tr>
                    <tr><td style={{ paddingTop: '15px' }}><DetailsBlock data={data} /></td></tr>
                  </>
                ) : (
                  <tr>
                    {data.layout === 'left' ? (
                      <>
                        <td valign={data.valign} style={{ paddingRight: '20px', textAlign: 'center' }}>
                          <div style={{ paddingTop: `${data.nudgeVertical}px`, marginBottom: '12px' }}>
                            {data.websiteUrl ? <a href={data.websiteUrl} target="_blank" rel="noreferrer">{logoContent}</a> : logoContent}
                          </div>
                          <SocialRow data={data} />
                        </td>
                        <td width="1" style={{ backgroundColor: '#e2e8f0', padding: 0 }}></td>
                        <td valign="top" style={{ paddingLeft: '20px' }}>
                          <DetailsBlock data={data} />
                        </td>
                      </>
                    ) : (
                      <>
                        <td valign="top" style={{ paddingRight: '20px' }}>
                          <DetailsBlock data={data} />
                        </td>
                        <td width="1" style={{ backgroundColor: '#e2e8f0', padding: 0 }}></td>
                        <td valign={data.valign} style={{ paddingLeft: '20px', textAlign: 'center' }}>
                          <div style={{ paddingTop: `${data.nudgeVertical}px`, marginBottom: '12px' }}>
                            {data.websiteUrl ? <a href={data.websiteUrl} target="_blank" rel="noreferrer">{logoContent}</a> : logoContent}
                          </div>
                          <SocialRow data={data} />
                        </td>
                      </>
                    )}
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        );
      });

      function App() {
        const companyOptions = [
          'Protathlitis Sportsmart LLP',
          'Nova Sportsmart Private Limited'
        ];

        const addressOptions = [
          'Plot-28,29, Mahagayatri Nagar, HMDA Layout, Hayathnagar, Rangareddy, Telangana, India - 501505',
          'Unit-NO: 7-140/2, E 5, LEFT PORTION, NAGENDRA NAGAR, SCIENTIST COLONY, HABSIGUDA, HYDERABAD- 500 007'
        ];

        const [formData, setFormData] = useState({
          name: '',
          title: '',
          company: companyOptions[0],
          websiteUrl: '',
          mobile: '',
          email: '',
          address: addressOptions[0],
          logoUrl: '',
          logoWidth: 100,
          layout: 'left',
          valign: 'top',
          nudgeVertical: 0,
          linkedin: '',
          facebook: '',
          instagram: '',
          youtube: ''
        });

        const [copied, setCopied] = useState(false);
        const [imageError, setImageError] = useState(false);
        const signatureRef = useRef(null);
        const fileInputRef = useRef(null);

        const handleInputChange = (e) => {
          const { name, value } = e.target;
          if (name === 'logoUrl') setImageError(false);
          setFormData((prev) => ({
            ...prev,
            [name]: (name === 'logoWidth' || name === 'nudgeVertical') ? parseInt(value, 10) || 0 : value
          }));
        };

        const handleFileUpload = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onloadend = () => {
              setFormData((prev) => ({ ...prev, logoUrl: reader.result }));
              setImageError(false);
            };
            reader.readAsDataURL(file);
          }
        };

        const copySignature = () => {
          if (signatureRef.current) {
            const range = document.createRange();
            range.selectNode(signatureRef.current);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          }
        };

        return (
          <div className="app-shell">
            <div className="glass w-full min-h-full rounded-[36px] overflow-hidden lg:grid lg:grid-cols-[430px_1fr]">
              <aside className="sidebar-scroll overflow-y-auto p-5 md:p-6 lg:p-7 border-b lg:border-b-0 lg:border-r border-white/30">
                <div className="flex items-center justify-between gap-4 mb-7">
                  <div className="flex items-center gap-3">
                    <div className="w-12 h-12 rounded-[20px] glass-chip flex items-center justify-center text-slate-800 shadow-sm">
                      <Icon name="sparkles" size={20} />
                    </div>
                    <div>
                      <h1 className="text-2xl font-semibold tracking-tight">Signature</h1>
                      <p className="text-xs text-slate-500">Glass iOS signature builder</p>
                    </div>
                  </div>
                  <div className="hidden md:flex items-center gap-2 glass-chip px-3 py-2 rounded-2xl text-[11px] font-semibold text-slate-600">
                    <Icon name="badgeCheck" size={14} /> Live editor
                  </div>
                </div>

                <div className="space-y-5 pb-10">
                  <GlassSection icon="user" title="Identity" subtitle="Add the personal details shown inside the signature.">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-[11px] font-semibold text-slate-600 mb-2 ml-1">Full Name</label>
                        <input className="field" name="name" value={formData.name} onChange={handleInputChange} placeholder="John Doe" />
                      </div>
                      <div>
                        <label className="block text-[11px] font-semibold text-slate-600 mb-2 ml-1">Job Title</label>
                        <input className="field" name="title" value={formData.title} onChange={handleInputChange} placeholder="Manager" />
                      </div>
                    </div>

                    <div className="mt-4">
                      <label className="block text-[11px] font-semibold text-slate-600 mb-2 ml-1">Company Name</label>
                      <div className="relative">
                        <select className="field appearance-none pr-10" name="company" value={formData.company} onChange={handleInputChange}>
                          {companyOptions.map((opt) => <option key={opt} value={opt}>{opt}</option>)}
                        </select>
                        <div className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                          <Icon name="chevronDown" size={16} />
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                      <div>
                        <label className="block text-[11px] font-semibold text-slate-600 mb-2 ml-1">Mobile</label>
                        <input className="field" name="mobile" value={formData.mobile} onChange={handleInputChange} placeholder="+1 234 567 890" />
                      </div>
                      <div>
                        <label className="block text-[11px] font-semibold text-slate-600 mb-2 ml-1">Email</label>
                        <input className="field" name="email" value={formData.email} onChange={handleInputChange} placeholder="john@doe.com" />
                      </div>
                    </div>

                    <div className="mt-4">
                      <label className="block text-[11px] font-semibold text-slate-600 mb-2 ml-1">Address</label>
                      <div className="relative">
                        <select className="field appearance-none pr-10" name="address" value={formData.address} onChange={handleInputChange}>
                          {addressOptions.map((opt) => <option key={opt} value={opt}>{opt}</option>)}
                        </select>
                        <div className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                          <Icon name="chevronDown" size={16} />
                        </div>
                      </div>
                    </div>
                  </GlassSection>

                  <GlassSection icon="layout" title="Logo & Layout" subtitle="Upload a logo and tune spacing with a softer Apple-style control panel.">
                    <div className="flex gap-3">
                      <button onClick={() => fileInputRef.current?.click()} className="glass-chip rounded-[20px] px-4 py-3 text-sm font-semibold text-slate-700 flex-1 flex items-center justify-center gap-2 hover:bg-white/70 transition">
                        <Icon name="upload" size={15} /> Upload Logo
                      </button>
                      {formData.logoUrl ? (
                        <button onClick={() => setFormData((p) => ({ ...p, logoUrl: '' }))} className="glass-chip rounded-[20px] px-4 py-3 text-red-500 hover:bg-red-50/70 transition">
                          <Icon name="x" size={16} />
                        </button>
                      ) : null}
                      <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept="image/*" className="hidden" />
                    </div>

                    <div className="mt-4">
                      <label className="block text-[11px] font-semibold text-slate-600 mb-2 ml-1">Website (link on logo)</label>
                      <div className="relative">
                        <input className="field pl-11" name="websiteUrl" value={formData.websiteUrl} onChange={handleInputChange} placeholder="https://www.company.com" />
                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                          <Icon name="globe" size={15} />
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mt-5">
                      <div className="glass-chip rounded-[22px] p-4">
                        <div className="flex items-center justify-between mb-3">
                          <span className="tiny-label">Logo Width</span>
                          <span className="text-sm font-semibold text-red-500">{formData.logoWidth}px</span>
                        </div>
                        <input type="range" name="logoWidth" min="40" max="220" value={formData.logoWidth} onChange={handleInputChange} />
                      </div>
                      <div className="glass-chip rounded-[22px] p-4">
                        <div className="flex items-center justify-between mb-3">
                          <span className="tiny-label">Vertical Nudge</span>
                          <span className="text-sm font-semibold text-red-500">+{formData.nudgeVertical}px</span>
                        </div>
                        <input type="range" name="nudgeVertical" min="0" max="60" value={formData.nudgeVertical} onChange={handleInputChange} />
                      </div>
                    </div>

                    <div className="mt-5">
                      <label className="block text-[11px] font-semibold text-slate-600 mb-2 ml-1">Logo Position</label>
                      <div className="segmented glass-chip">
                        {['left', 'top', 'right'].map((pos) => (
                          <button key={pos} className={formData.layout === pos ? 'active' : ''} onClick={() => setFormData((p) => ({ ...p, layout: pos }))}>
                            {pos}
                          </button>
                        ))}
                      </div>
                    </div>
                  </GlassSection>

                  <GlassSection icon="share" title="Social Profiles" subtitle="Add profile links to show branded social icons below the logo.">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {['linkedin', 'facebook', 'instagram', 'youtube'].map((social) => (
                        <div key={social}>
                          <label className="block text-[11px] font-semibold text-slate-600 mb-2 ml-1 capitalize">{social}</label>
                          <input className="field" name={social} value={formData[social]} onChange={handleInputChange} placeholder={`https://${social}.com/...`} />
                        </div>
                      ))}
                    </div>
                  </GlassSection>
                </div>
              </aside>

              <main className="content-scroll overflow-y-auto p-5 md:p-7 lg:p-8">
                <div className="max-w-4xl mx-auto">
                  <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-6">
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 rounded-[20px] glass-chip flex items-center justify-center text-slate-800">
                        <Icon name="monitor" size={20} />
                      </div>
                      <div>
                        <h2 className="text-xl font-semibold">Live Preview</h2>
                        <p className="text-sm text-slate-500">Modern glass UI with a softer iOS-style visual system</p>
                      </div>
                    </div>

                    <button
                      onClick={copySignature}
                      className={`copy-btn rounded-[22px] px-6 py-3.5 text-sm font-semibold flex items-center gap-2 ${copied ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-200' : 'glass-chip text-slate-800 hover:bg-white/80'}`}
                    >
                      <Icon name={copied ? 'check' : 'copy'} size={18} />
                      {copied ? 'Copied Successfully' : 'Copy for Outlook'}
                    </button>
                  </div>

                  <div className="glass-soft rounded-[34px] p-4 md:p-5 mb-6">
                    <div className="signature-stage glass-soft p-4 md:p-6 lg:p-8">
                      <div className="flex items-center justify-between mb-5">
                        <div className="flex items-center gap-2 text-slate-400 text-xs font-semibold tracking-[0.2em] uppercase">
                          <div className="flex gap-2">
                            <span className="w-3 h-3 rounded-full bg-white/70 border border-white/70"></span>
                            <span className="w-3 h-3 rounded-full bg-white/70 border border-white/70"></span>
                            <span className="w-3 h-3 rounded-full bg-white/70 border border-white/70"></span>
                          </div>
                          Message Preview
                        </div>
                        <button onClick={() => setImageError(false)} className="glass-chip rounded-2xl px-3 py-2 text-slate-500 hover:text-slate-700 transition flex items-center gap-2 text-xs font-semibold">
                          <Icon name="refresh" size={14} /> Refresh
                        </button>
                      </div>

                      <div className="min-h-[310px] flex items-center justify-center px-2">
                        <div className="signature-card">
                          <SignaturePreview ref={signatureRef} data={formData} imageError={imageError} setImageError={setImageError} />
                        </div>
                      </div>

                      <div className="mt-6 flex items-center justify-center gap-2 text-[11px] font-semibold text-slate-400 uppercase tracking-[0.18em]">
                        <Icon name="pointer" size={12} /> Interactive canvas
                      </div>
                    </div>
                  </div>

                  <div className="grid md:grid-cols-2 gap-4">
                    <div className="glass-soft rounded-[28px] p-5 flex gap-4">
                      <div className="w-11 h-11 rounded-[18px] glass-chip flex items-center justify-center text-red-500 shrink-0">
                        <Icon name="wand" size={18} />
                      </div>
                      <div>
                        <h3 className="text-sm font-semibold mb-1">Glass UX polish</h3>
                        <p className="text-sm text-slate-500 leading-6">Rounded panels, depth, blur, light borders, floating highlights, and softer controls create a more premium iOS-inspired experience.</p>
                      </div>
                    </div>

                    <div className="glass-soft rounded-[28px] p-5 flex gap-4">
                      <div className="w-11 h-11 rounded-[18px] glass-chip flex items-center justify-center text-blue-500 shrink-0">
                        <Icon icon={Monitor} size={18} />
                      </div>
                      <div>
                        <h3 className="text-sm font-semibold mb-1">Outlook ready</h3>
                        <p className="text-sm text-slate-500 leading-6">The signature output still uses table-based HTML for better email client compatibility while the app UI stays modern.</p>
                      </div>
                    </div>
                  </div>
                </div>
              </main>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
